<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Quiz Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="trivia.js" defer></script>
</head>
<body>

    <header>
        <h1>My JavaScript Trivia Quiz</h1>
        <div id="date-display"></div>
        <h2 id="greeting-display"></h2>
        <hr>
    </header>

    <main>
        <div id="user-info-display"></div>
        
        <div id="quote-display"></div>
        
        <hr>

        <p>Click the button below to start the personalized trivia game!</p>
        
        <button onclick="startQuiz()">Start Quiz</button>

        <div id="score-display"></div>
    </main>

</body>
</html>
